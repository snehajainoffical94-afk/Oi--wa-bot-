name: OI Alert Bot

on:
  schedule:
    # Every 60 min Mon-Fri, IST times → UTC (IST = UTC+5:30)
    - cron: '45 3 * * 1-5'   # 9:15 AM IST
    - cron: '45 4 * * 1-5'   # 10:15 AM IST
    - cron: '45 5 * * 1-5'   # 11:15 AM IST
    - cron: '45 6 * * 1-5'   # 12:15 PM IST
    - cron: '45 7 * * 1-5'   # 1:15 PM IST
    - cron: '45 8 * * 1-5'   # 2:15 PM IST
    - cron: '45 9 * * 1-5'   # 3:15 PM IST
  workflow_dispatch:   # manual "Run workflow" button on GitHub

jobs:
  oi-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore previous OI state so we can calculate OI *change*
      - name: Restore OI state
        uses: actions/cache@v4
        with:
          path: state/groww_oi_state.json
          key: oi-state-${{ runner.os }}
          restore-keys: |
            oi-state-

      - name: Run OI Bot
        env:
          GROWW_API_TOKEN:    ${{ secrets.GROWW_API_TOKEN }}
          GROW_API_SECRET:    ${{ secrets.GROW_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python groww_bot.py
