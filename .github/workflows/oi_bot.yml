name: OI Alert Bot

on:
  schedule:
    # Every 60 min Mon-Fri, IST times → UTC (IST = UTC+5:30)
    - cron: '45 3 * * 1-5'   # 9:15 AM IST
    - cron: '45 4 * * 1-5'   # 10:15 AM IST
    - cron: '45 5 * * 1-5'   # 11:15 AM IST
    - cron: '45 6 * * 1-5'   # 12:15 PM IST
    - cron: '45 7 * * 1-5'   # 1:15 PM IST
    - cron: '45 8 * * 1-5'   # 2:15 PM IST
    - cron: '45 9 * * 1-5'   # 3:15 PM IST
  workflow_dispatch:   # manual "Run workflow" button on GitHub

jobs:
  oi-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run OI Bot
        env:
          ANGEL_CLIENT_ID:   ${{ secrets.ANGEL_CLIENT_ID }}
          ANGEL_API_KEY:     ${{ secrets.ANGEL_API_KEY }}
          ANGEL_API_SECRET:  ${{ secrets.ANGEL_API_SECRET }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
          ANGEL_PASSWORD:    ${{ secrets.ANGEL_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          STRIKE_WINDOW: '15'
          TOP_WALLS: '3'
          SPIKE_THRESHOLD: '30'
          INDICES: 'NIFTY'
        run: python main.py test
